<h2>Login</h2>
<form (ngSubmit)="onSubmit()">
  <label>Username: <input type="text" [(ngModel)]="credentials.username" name="username" required></label>
  <label>Password: <input type="password" [(ngModel)]="credentials.password" name="password" required></label>
  <button type="submit">Login</button>
</form>
